<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Greeting Section -->
        <section class="greeting-section">
            <h1 id="greeting">Good Morning</h1>
            <p id="datetime"></p>
            <input type="text" id="userName" placeholder="Enter your name" />
        </section>

        <!-- Focus Timer Section -->
        <section class="timer-section">
            <h2>Focus Timer</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-settings">
                <label for="timerMinutes">Minutes:</label>
                <input type="number" id="timerMinutes" min="1" max="60" value="25" />
            </div>
            <div class="timer-controls">
                <button id="startBtn">Start</button>
                <button id="stopBtn">Stop</button>
                <button id="resetBtn">Reset</button>
            </div>
        </section>

        <!-- To-Do List Section -->
        <section class="todo-section">
            <h2>To-Do List</h2>
            <div class="todo-input">
                <input type="text" id="todoInput" placeholder="Add a new task..." />
                <button id="addTodoBtn">Add</button>
            </div>
            <ul id="todoList"></ul>
        </section>

        <!-- Quick Links Section -->
        <section class="links-section">
            <h2>Quick Links</h2>
            <div class="link-input">
                <input type="text" id="linkName" placeholder="Link name" />
                <input type="url" id="linkUrl" placeholder="https://example.com" />
                <button id="addLinkBtn">Add Link</button>
            </div>
            <div id="linksList" class="links-grid"></div>
        </section>

        <!-- Dark Mode Toggle -->
        <button id="darkModeToggle" class="dark-mode-toggle">🌙</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
